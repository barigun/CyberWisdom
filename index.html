<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CyberWisdom — Security Knowledge Display</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --accent: #00e5ff;
    --accent2: #ff6b35;
    --dim: rgba(255,255,255,0.55);
    --dimmer: rgba(255,255,255,0.3);
    --trans-slow: 1.4s cubic-bezier(0.4, 0, 0.2, 1);
    --trans-med: 0.6s cubic-bezier(0.4, 0, 0.2, 1);
  }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #000;
    color: #fff;
    font-family: 'Syne', sans-serif;
    cursor: none;
  }

  body.show-cursor { cursor: default; }

  /* ── Background layer ── */
  #bg-wrap {
    position: fixed; inset: 0; z-index: 0;
  }

  .bg-slide {
    position: absolute; inset: 0;
    background-size: cover;
    background-position: center;
    opacity: 0;
    transition: opacity var(--trans-slow);
    transform: scale(1.04);
    animation: none;
  }
  .bg-slide.active {
    opacity: 1;
    animation: slowzoom 20s ease-out forwards;
  }
  @keyframes slowzoom {
    from { transform: scale(1.04); }
    to   { transform: scale(1.0); }
  }

  /* ── Overlay ── */
  #overlay {
    position: fixed; inset: 0; z-index: 1;
    background: linear-gradient(
      135deg,
      rgba(0,0,0,0.75) 0%,
      rgba(0,0,0,0.45) 50%,
      rgba(0,0,0,0.72) 100%
    );
  }
  /* subtle scanline texture */
  #overlay::after {
    content: '';
    position: absolute; inset: 0;
    background-image: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.03) 2px,
      rgba(0,0,0,0.03) 4px
    );
    pointer-events: none;
  }

  /* ── Main card ── */
  #card {
    position: fixed; inset: 0; z-index: 2;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: flex-start;
    padding: 8vw 10vw;
    max-width: 960px;
  }

  .card-inner {
    opacity: 0;
    transform: translateY(28px);
    transition: opacity var(--trans-slow), transform var(--trans-slow);
  }
  .card-inner.visible {
    opacity: 1;
    transform: translateY(0);
  }

  /* category badge */
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--accent);
    border: 1px solid rgba(0,229,255,0.35);
    padding: 5px 13px;
    border-radius: 2px;
    margin-bottom: 2.4rem;
    backdrop-filter: blur(4px);
    background: rgba(0,229,255,0.06);
  }
  .badge .dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--accent);
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* main quote / statement */
  .statement {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(1.9rem, 4.2vw, 3.4rem);
    line-height: 1.22;
    color: #fff;
    font-weight: 400;
    max-width: 820px;
    margin-bottom: 2.8rem;
    text-shadow: 0 2px 40px rgba(0,0,0,0.5);
  }
  .statement em {
    font-style: italic;
    color: rgba(255,255,255,0.88);
  }

  /* source line */
  .source-wrap {
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .source-line {
    width: 36px;
    height: 1px;
    background: var(--accent2);
  }
  .source-text {
    font-family: 'DM Mono', monospace;
    font-size: 12.5px;
    color: var(--dim);
    letter-spacing: 0.06em;
  }
  .source-text strong {
    color: rgba(255,255,255,0.85);
    font-weight: 500;
  }

  /* context note (optional extra line) */
  .context-note {
    margin-top: 2rem;
    font-size: 13px;
    color: var(--dimmer);
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.04em;
    max-width: 560px;
    line-height: 1.7;
    border-left: 2px solid rgba(0,229,255,0.25);
    padding-left: 14px;
  }

  /* ── Progress bar ── */
  #progress-wrap {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: 2px;
    background: rgba(255,255,255,0.07);
    z-index: 10;
  }
  #progress-bar {
    height: 100%;
    width: 0%;
    background: var(--accent);
    transition: width linear;
    box-shadow: 0 0 8px var(--accent);
  }

  /* ── UI chrome (top) ── */
  #chrome-top {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 10;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 22px 32px;
    opacity: 0;
    transition: opacity 0.4s;
  }
  #chrome-top.visible { opacity: 1; }

  .wordmark {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--dimmer);
  }
  .wordmark span { color: var(--accent); }

  .controls {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .ctrl-btn {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12);
    color: var(--dim);
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    padding: 6px 14px;
    border-radius: 2px;
    cursor: pointer;
    transition: background 0.2s, color 0.2s, border-color 0.2s;
    text-transform: uppercase;
  }
  .ctrl-btn:hover {
    background: rgba(0,229,255,0.12);
    border-color: rgba(0,229,255,0.4);
    color: var(--accent);
  }
  .ctrl-btn.active {
    background: rgba(0,229,255,0.15);
    border-color: var(--accent);
    color: var(--accent);
  }

  /* counter */
  #counter {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--dimmer);
    letter-spacing: 0.06em;
  }

  /* ── Bottom chrome ── */
  #chrome-bottom {
    position: fixed;
    bottom: 18px; right: 32px;
    z-index: 10;
    display: flex;
    gap: 6px;
    align-items: center;
    opacity: 0;
    transition: opacity 0.4s;
  }
  #chrome-bottom.visible { opacity: 1; }

  .key-hint {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--dimmer);
    letter-spacing: 0.08em;
  }
  .key {
    display: inline-block;
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 3px;
    padding: 1px 6px;
    font-size: 10px;
    color: rgba(255,255,255,0.4);
    font-family: 'DM Mono', monospace;
    margin: 0 2px;
  }

  /* ── Pause overlay ── */
  #pause-indicator {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    z-index: 20;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent);
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
  }
  #pause-indicator.show { opacity: 1; }

  /* ── Category color accents ── */
  .cat-quote    { --accent: #00e5ff; }
  .cat-principle{ --accent: #b8ff57; }
  .cat-attack   { --accent: #ff6b35; }
  .cat-defense  { --accent: #57c8ff; }
  .cat-incident { --accent: #ffb730; }
  .cat-mindset  { --accent: #d57aff; }
  .cat-howto    { --accent: #57ffb8; }
  .cat-stat     { --accent: #ffde57; }

  /* ── Intro splash ── */
  #splash {
    position: fixed; inset: 0;
    z-index: 100;
    background: #000;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    transition: opacity 1s;
  }
  #splash.fade { opacity: 0; pointer-events: none; }

  .splash-logo {
    font-family: 'DM Serif Display', serif;
    font-size: 3.2rem;
    letter-spacing: -0.01em;
    color: #fff;
  }
  .splash-logo span { color: var(--accent); }
  .splash-sub {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--dimmer);
  }
  .splash-bar {
    width: 120px; height: 1px;
    background: rgba(255,255,255,0.1);
    margin-top: 8px;
    overflow: hidden;
  }
  .splash-bar-fill {
    height: 100%;
    background: var(--accent);
    width: 0%;
    animation: splash-load 1.6s ease-out 0.3s forwards;
    box-shadow: 0 0 6px var(--accent);
  }
  @keyframes splash-load { to { width: 100%; } }
</style>
</head>
<body>

<!-- Intro splash -->
<div id="splash">
  <div class="splash-logo">Cyber<span>Wisdom</span></div>
  <div class="splash-sub">Security knowledge · Ambient display</div>
  <div class="splash-bar"><div class="splash-bar-fill"></div></div>
</div>

<!-- Background -->
<div id="bg-wrap"></div>
<div id="overlay"></div>

<!-- Pause indicator -->
<div id="pause-indicator">⏸ paused</div>

<!-- Top chrome -->
<div id="chrome-top">
  <div class="wordmark">Cyber<span>Wisdom</span></div>
  <div class="controls">
    <span id="counter">1 / 40</span>
    <button class="ctrl-btn" id="btn-prev">← prev</button>
    <button class="ctrl-btn" id="btn-pause">pause</button>
    <button class="ctrl-btn" id="btn-next">next →</button>
    <button class="ctrl-btn" id="btn-fullscreen">fullscreen</button>
  </div>
</div>

<!-- Main card -->
<div id="card">
  <div class="card-inner" id="card-inner">
    <div class="badge"><span class="dot"></span><span id="badge-text">Quote</span></div>
    <div class="statement" id="statement-text"></div>
    <div class="source-wrap">
      <div class="source-line"></div>
      <div class="source-text" id="source-text"></div>
    </div>
    <div class="context-note" id="context-note" style="display:none"></div>
  </div>
</div>

<!-- Progress -->
<div id="progress-wrap"><div id="progress-bar"></div></div>

<!-- Bottom hints -->
<div id="chrome-bottom">
  <span class="key-hint">
    <span class="key">Space</span> pause
    <span class="key">←→</span> navigate
    <span class="key">F</span> fullscreen
    <span class="key">H</span> hide ui
  </span>
</div>

  {

    label: "Quote",

  {

// ── State ──────────────────────────────────────────────────
let current = 0;
let paused = false;
let uiHidden = false;
let timer = null;
let progressTimer = null;
const INTERVAL = 18000; // 18 seconds

// ── DOM refs ───────────────────────────────────────────────
const bgWrap       = document.getElementById('bg-wrap');
const cardInner    = document.getElementById('card-inner');
const badgeText    = document.getElementById('badge-text');
const statementEl  = document.getElementById('statement-text');
const sourceEl     = document.getElementById('source-text');
const contextEl    = document.getElementById('context-note');
const progressBar  = document.getElementById('progress-bar');
const counter      = document.getElementById('counter');
const chromeTop    = document.getElementById('chrome-top');
const chromeBot    = document.getElementById('chrome-bottom');
const pauseInd     = document.getElementById('pause-indicator');
const btnPause     = document.getElementById('btn-pause');

// Preload backgrounds
function preloadImages() {
  CARDS.forEach(c => {
    const img = new Image();
    img.src = c.bg;
  });
}

// ── Background setup ──────────────────────────────────────
function setupBg() {
  CARDS.forEach((c, i) => {
    const div = document.createElement('div');
    div.className = 'bg-slide';
    div.style.backgroundImage = `url(${c.bg})`;
    div.dataset.index = i;
    bgWrap.appendChild(div);
  });
}

function activateBg(index) {
  document.querySelectorAll('.bg-slide').forEach((el, i) => {
    el.classList.toggle('active', i === index);
  });
}

// ── Card render ───────────────────────────────────────────
function showCard(index, direction = 1) {
  const card = CARDS[index];

  // Fade out
  cardInner.classList.remove('visible');

  setTimeout(() => {
    // Update category color class on card element
    const parent = document.getElementById('card');
    parent.className = '';
    parent.id = 'card';
    parent.classList.add('cat-' + card.cat);

    badgeText.textContent = card.label;
    statementEl.textContent = card.text;

    // Source
    const parts = card.source.split(' — ');
    if (parts.length > 1) {
      sourceEl.innerHTML = `<strong>${parts[0]}</strong> — ${parts.slice(1).join(' — ')}`;
    } else {
      sourceEl.innerHTML = `<strong>${card.source}</strong>`;
    }

    // Context note
    if (card.context) {
      contextEl.style.display = 'block';
      contextEl.textContent = card.context;
    } else {
      contextEl.style.display = 'none';
    }

    counter.textContent = `${index + 1} / ${CARDS.length}`;

    // Fade in
    requestAnimationFrame(() => {
      cardInner.classList.add('visible');
    });
  }, 500);

  activateBg(index);
  startProgress();
}

// ── Progress bar ──────────────────────────────────────────
function startProgress() {
  progressBar.style.transition = 'none';
  progressBar.style.width = '0%';

  clearTimeout(progressTimer);
  if (paused) return;

  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      progressBar.style.transition = `width ${INTERVAL}ms linear`;
      progressBar.style.width = '100%';
    });
  });
}

function stopProgress() {
  const computed = getComputedStyle(progressBar).width;
  const total = progressBar.parentElement.offsetWidth;
  const pct = (parseFloat(computed) / total) * 100;
  progressBar.style.transition = 'none';
  progressBar.style.width = pct + '%';
}

// ── Auto-advance ──────────────────────────────────────────
function scheduleNext() {
  clearTimeout(timer);
  if (paused) return;
  timer = setTimeout(() => {
    next();
  }, INTERVAL);
}

function next() {
  current = (current + 1) % CARDS.length;
  showCard(current, 1);
  scheduleNext();
}

function prev() {
  current = (current - 1 + CARDS.length) % CARDS.length;
  showCard(current, -1);
  scheduleNext();
}

// ── Pause / resume ────────────────────────────────────────
function togglePause() {
  paused = !paused;
  btnPause.textContent = paused ? 'resume' : 'pause';
  btnPause.classList.toggle('active', paused);
  pauseInd.classList.toggle('show', paused);

  if (paused) {
    clearTimeout(timer);
    stopProgress();
  } else {
    startProgress();
    scheduleNext();
  }
}

// ── Fullscreen ────────────────────────────────────────────
function toggleFullscreen() {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen().catch(() => {});
  } else {
    document.exitFullscreen();
  }
}

// ── Hide UI ───────────────────────────────────────────────
function toggleUI() {
  uiHidden = !uiHidden;
  chromeTop.style.opacity = uiHidden ? '0' : '';
  chromeBot.style.opacity = uiHidden ? '0' : '';
}

// ── Cursor hide on idle ───────────────────────────────────
let cursorTimer;
document.addEventListener('mousemove', () => {
  document.body.classList.add('show-cursor');
  chromeTop.classList.add('visible');
  chromeBot.classList.add('visible');
  clearTimeout(cursorTimer);
  cursorTimer = setTimeout(() => {
    document.body.classList.remove('show-cursor');
    if (!uiHidden) {
      chromeTop.classList.remove('visible');
      chromeBot.classList.remove('visible');
    }
  }, 3000);
});

// ── Keyboard ──────────────────────────────────────────────
document.addEventListener('keydown', e => {
  switch (e.key) {
    case ' ':
    case 'p':
    case 'P':
      e.preventDefault();
      togglePause();
      break;
    case 'ArrowRight':
    case 'n':
    case 'N':
      next();
      break;
    case 'ArrowLeft':
    case 'b':
    case 'B':
      prev();
      break;
    case 'f':
    case 'F':
      toggleFullscreen();
      break;
    case 'h':
    case 'H':
      toggleUI();
      break;
  }
});

// ── Button wiring ─────────────────────────────────────────
document.getElementById('btn-prev').addEventListener('click', () => prev());
document.getElementById('btn-next').addEventListener('click', () => next());
document.getElementById('btn-pause').addEventListener('click', () => togglePause());
document.getElementById('btn-fullscreen').addEventListener('click', toggleFullscreen);

// ── Init ─────────────────────────────────────────────────
preloadImages();
setupBg();

// Splash → start
setTimeout(() => {
  document.getElementById('splash').classList.add('fade');
  setTimeout(() => {
    document.getElementById('splash').remove();
  }, 1200);
  showCard(0);
  scheduleNext();
}, 2000);
</script>
